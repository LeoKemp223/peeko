name: AI Code Review

# 在 PR 创建或更新时触发嵌入式代码审查。
# 当前流程只发布 AI 审查评论，不自动阻止 PR 合并。
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    # 脚本需要读取代码、读取 PR 信息，并以 issue comment 的形式发布审查结果。
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      # 拉取当前 PR 对应的仓库内容，供审查脚本读取。
      - uses: actions/checkout@v4

      # review.js 只依赖 Node.js 20 内置能力，不需要 npm install。
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # LLM_* secrets 需要在仓库 Settings -> Secrets and variables -> Actions 中配置。
      # LLM_BASE_URL 填基础地址即可，例如 https://api.example.com/v1，脚本会自动拼接 /chat/completions。
      # REVIEW_* 是必填配置，用于告诉脚本当前嵌入式项目的名称、描述和 GitHub API 客户端标识。
      - run: node scripts/review.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

          # 项目名称：会写入 AI 提示词，帮助模型理解正在审查哪个仓库。
          REVIEW_PROJECT_NAME: "peeko"

          # 项目简介：会写入 AI 提示词，复用到其他嵌入式项目时改成该项目的一句话描述。
          REVIEW_PROJECT_DESCRIPTION: "一个面向嵌入式开发的工具链项目"

          # GitHub API 客户端标识：仅用于请求头，建议改成“项目名-ai-review”。
          REVIEW_USER_AGENT: "peeko-ai-review"
